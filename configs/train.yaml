# Training config for two-tower SBERT
# Run: uv run python -m src.training
# Override: uv run python -m src.training --config configs/other.yaml

# Paths: processed data from data prep, output for checkpoints
processed_dir: processed
output_dir: models/two_tower_sbert

# Model: base SentenceTransformer; max_seq_length truncates/pads inputs
model_name: sentence-transformers/all-MiniLM-L6-v2
max_seq_length: 256

# Training: epochs, batch sizes, gradient accumulation
epochs: 5
train_batch_size: 64
eval_batch_size: 64
gradient_accumulation_steps: 1

# Optimizer: learning rate; loss_scale for MultipleNegativesRankingLoss
learning_rate: 5.0e-5
loss_scale: 30.0

# DataLoader: 0 for MPS (Apple Silicon); 4-8 for CUDA
# IR evaluator: runs Accuracy@k, MRR@10, NDCG@10 each epoch; saves best by NDCG@10
dataloader_num_workers: 0 # 0 for MPS; 4-8 for CUDA
run_information_retrieval_evaluator: true
