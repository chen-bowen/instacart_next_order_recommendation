# Training config for two-tower SBERT
# Run: uv run python -m src.train
# Override: uv run python -m src.train --config config/other.yaml

processed_dir: processed
output_dir: models/two_tower_sbert

model_name: sentence-transformers/all-MiniLM-L6-v2
max_seq_length: 256

epochs: 5
train_batch_size: 64
eval_batch_size: 64
gradient_accumulation_steps: 1

learning_rate: 5.0e-5
loss_scale: 30.0

dataloader_num_workers: 0  # 0 for MPS; 4-8 for CUDA
run_information_retrieval_evaluator: true
