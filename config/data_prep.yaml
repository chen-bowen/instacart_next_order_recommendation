# Data preparation config for Instacart two-tower SBERT training
# Run: uv run python -m src.data.prepare_instacart_sbert
# Override: uv run python -m src.data.prepare_instacart_sbert --config config/other.yaml

data_dir: data
output_dir: processed

max_prior_orders: 5
max_product_names: 20

sample_frac: null  # Optional: e.g. 0.2 to subsample train pairs for quick runs
eval_frac: 0.1
eval_serve_time: true  # Strip "Next: ..." from eval queries (matches production)

max_target_orders: null  # Optional: limit target orders for quick runs
seed: 42
